<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pokemon Team Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="outer">
    <section class="inner">
      <h1>Name or ID</h1>

      <div class="searchRow">
        <input id="query" type="text" placeholder="e.g., 25 or pikachu" />
        <button id="findBtn" type="button">Find</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>

      <div class="viewer">
        <img id="sprite" alt="Pokemon sprite" />
        <audio id="cry" controls></audio>
      </div>

      <div class="movesGrid">
        <select id="move1"></select>
        <select id="move2"></select>
        <select id="move3"></select>
        <select id="move4"></select>
      </div>

      <button id="addBtn" type="button" class="addBtn" disabled>Add to Team</button>

      <div class="teamWrap">
        <table class="teamTable">
          <tbody id="teamBody"></tbody>
        </table>
      </div>

      <button id="clearBtn" type="button" class="clearBtn">Clear Team</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
